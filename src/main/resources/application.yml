server:
  port: 8080

spring:
  application:
    name: langchain4j-deepseek-demo

# =============================================
# LangChain4j + 腾讯云 DeepSeek 配置
# 通过腾讯云知识引擎原子能力接入 DeepSeek
# 接口兼容 OpenAI 协议，只需修改 base-url 和 api-key
# =============================================
langchain4j:
  open-ai:
    chat-model:
      # 腾讯云 TokenHub API 地址 (OpenAI 兼容)
      base-url: https://tokenhub.tencentmaas.com/v1
      # 腾讯云 API Key (在 TokenHub 控制台创建: https://console.cloud.tencent.com/tokenhub)
      api-key: ${TENCENT_LKEAP_API_KEY:your-api-key-here}
      # DeepSeek V4-Pro 模型 (2026.4.24 发布，1M 超长上下文，支持 Function Calling + 思维链)
      # 可选模型: deepseek-v4-pro, deepseek-v4-flash, deepseek-v3.2, deepseek-r1-0528 等
      model-name: deepseek-v4-pro
      temperature: 0.7
      timeout: PT60S
      log-requests: true
      log-responses: true
